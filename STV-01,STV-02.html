<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termék Adatlap - Mikronika PC</title>
    <style>
        /* STÍLUS (V3.0) */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); background-attachment: fixed; color: #333; min-height: 100vh; }
        #wrapper { width: 1200px; max-width: 98%; margin: 20px auto; background-color: #fff; border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        #header { background: #fff; padding: 15px; text-align: center; border-bottom: 4px solid #d70e02; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .logo-img { max-width: 400px; height: auto; }
        #nav { margin-top: 5px; font-weight: bold; font-size: 20px; text-transform: uppercase; background: #eee; padding: 10px 30px; border-radius: 20px; }
        #nav a { color: #d70e02; text-decoration: none; padding: 0 15px; }
        #nav a:hover { color: #000; text-decoration: underline; }
        
        .product-container { display: flex; flex-wrap: wrap; padding: 40px; gap: 40px; }
        .product-image { flex: 0 0 400px; max-width: 100%; text-align: center; }
        .product-image img { max-width: 100%; border: 1px solid #ccc; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: zoom-in; transition: 0.3s; }
        .product-image img:hover { opacity: 0.9; border-color: #d70e02; }
        .product-details { flex: 1; }
        h1 { color: #d70e02; margin-top: 0; font-size: 32px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .price-tag { font-size: 24px; font-weight: bold; color: #fff; background: #333; display: inline-block; padding: 10px 20px; border-radius: 5px; margin: 20px 0; }
        .specs-box { margin-top: 30px; background: #f9f9f9; padding: 20px; border-left: 5px solid #d70e02; }
        .specs-box h3 { margin-top: 0; }
        .back-link { display: block; margin-top: 40px; text-align: center; padding: 20px; background: #222; color: white; text-decoration: none; font-weight: bold; }
        .back-link:hover { background: #d70e02; }
        @media (max-width: 800px) { .product-container { flex-direction: column; } .product-image { flex: 0 0 100%; } }

        /* LIGHTBOX */
        #imageModal { display: none; position: fixed; z-index: 9999; padding-top: 30px; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.95); backdrop-filter: blur(5px); }
        .modal-content { margin: auto; display: block; max-width: 95vw; max-height: 95vh; width: auto; height: auto; border: 2px solid #fff; animation: zoom 0.3s; }
        @keyframes zoom { from {transform:scale(0.8); opacity:0} to {transform:scale(1); opacity:1} }
        .close { position: absolute; top: 20px; right: 40px; color: #fff; font-size: 50px; font-weight: bold; cursor: pointer; }
        .close:hover { color: #d70e02; }
    </style>
</head>
<body>
<div id="imageModal"><span class="close" onclick="closeModal()">&times;</span><img class="modal-content" id="img01"></div>
<div id="wrapper">
    <div id="header">
        <a href="index.html"><img src="images fooldal/logo.png" alt="Mikronika PC" class="logo-img"></a>
        <div id="nav"><a href="index.html">Főoldal</a> | <a href="katalogus.html">Katalógus</a> | <a href="P=2.html">Kapcsolatok</a></div>
    </div>

    <div class="product-container"><div class="product-image">
        <img src="images/kapcsolo_10.jpg" data-fullsize="images nagy/STV-01,STV-02.jpg" alt="STV-01" onclick="openModal(this)">
    </div>
    <div class="product-details">
        <h1>STV-01 / STV-02 Kapcsoló</h1>
        <p style="font-size: 18px;">Erősáramú billenő kapcsoló visszajelző fénnyel (Piros vagy Zöld).</p>
        <div class="price-tag">250V / 15A</div>
        <div class="specs-box">
            <h3>Adatok:</h3>
            <ul><li>Terhelhetőség: 15A</li><li>Áramkörök: 2 áramkör</li><li>Állások: 2 állás</li><li>Világítás: Izzó (250V)</li></ul>
        </div>
    </div>
    <a href="katalogus.html" class="back-link" style="width:100%;">◄ Vissza a Kapcsolókhoz</a>
        </div>

</div>
<script>
    function openModal(element) {
        var modal = document.getElementById("imageModal");
        var modalImg = document.getElementById("img01");
        modal.style.display = "block";
        var fullSizeSrc = element.getAttribute('data-fullsize') || element.src;
        modalImg.src = fullSizeSrc;
    }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }
    window.onclick = function(event) { if (event.target == document.getElementById("imageModal")) closeModal(); }
</script>
</body>
</html>
